<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern User Registration</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}


.container{
    width:450px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
    animation:slide .6s ease;
}


@keyframes slide{
    from{
        opacity:0;
        transform:translateY(-40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}


h2{
    text-align:center;
    color:#333;
    margin-bottom:25px;
}

h2 i{
    color:#667eea;
}


.form-group{
    margin-bottom:18px;
}


label{
    display:block;
    font-weight:600;
    margin-bottom:7px;
    color:#444;
}


.input-box{
    position:relative;
}


.input-box i{
    position:absolute;
    top:50%;
    left:15px;
    transform:translateY(-50%);
    color:#777;
}


input,
select,
textarea{

    width:100%;
    padding:12px 15px 12px 45px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
    transition:.3s;

}


textarea{
    resize:none;
}


input:focus,
select:focus,
textarea:focus{

    border-color:#667eea;
    box-shadow:0 0 8px rgba(102,126,234,.3);

}



.gender{
    display:flex;
    gap:20px;
}


.gender label{

    font-weight:normal;
}


.gender input{

    width:auto;
}


.password-box{
    position:relative;
}


.password-box span{

    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#555;

}


.strength{

    height:6px;
    background:#ddd;
    margin-top:8px;
    border-radius:10px;
}


#strengthBar{

    height:100%;
    width:0%;
    border-radius:10px;
    transition:.4s;

}


.checkbox{

    display:flex;
    gap:10px;
    align-items:center;
    font-size:14px;
}


.checkbox input{

    width:auto;

}


button{

    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;

}


button:hover{

    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(102,126,234,.4);

}


.login{

    text-align:center;
    margin-top:20px;

}


.login a{

    color:#667eea;
    text-decoration:none;
    font-weight:bold;

}


#message{

    text-align:center;
    margin-top:15px;
    font-weight:bold;

}



@media(max-width:500px){

.container{
    width:100%;
    padding:25px;
}

}

</style>

</head>


<body>


<div class="container">

<h2>
<i class="fa-solid fa-user-plus"></i>
Create Account
</h2>


<form id="registerForm">


<div class="form-group">

<label>Full Name</label>

<div class="input-box">
<i class="fa fa-user"></i>
<input type="text" id="name" placeholder="Enter full name" required>
</div>

</div>



<div class="form-group">

<label>Email Address</label>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="Enter email" required>
</div>

</div>




<div class="form-group">

<label>Phone Number</label>

<div class="input-box">
<i class="fa fa-phone"></i>
<input type="tel" placeholder="Enter phone number" required>
</div>

</div>




<div class="form-group">

<label>Date of Birth</label>

<div class="input-box">
<i class="fa fa-calendar"></i>
<input type="date" required>
</div>

</div>




<div class="form-group">

<label>Gender</label>

<div class="gender">

<label>
<input type="radio" name="gender" required>
Male
</label>


<label>
<input type="radio" name="gender">
Female
</label>


<label>
<input type="radio" name="gender">
Other
</label>


</div>

</div>





<div class="form-group">

<label>Country</label>

<div class="input-box">

<i class="fa fa-globe"></i>

<select required>

<option value="">Choose Country</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
<option>Canada</option>
<option>Australia</option>

</select>

</div>

</div>




<div class="form-group">

<label>Address</label>

<div class="input-box">

<i class="fa fa-location-dot"></i>

<textarea rows="3" placeholder="Enter address"></textarea>

</div>

</div>






<div class="form-group">

<label>Password</label>

<div class="password-box">

<div class="input-box">

<i class="fa fa-lock"></i>

<input type="password" id="password" placeholder="Create password" required>

</div>

<span onclick="showPassword()">
<i class="fa fa-eye"></i>
</span>

</div>


<div class="strength">

<div id="strengthBar"></div>

</div>


</div>







<div class="form-group">

<label>Confirm Password</label>

<div class="input-box">

<i class="fa fa-lock"></i>

<input type="password" id="confirm" placeholder="Confirm password" required>

</div>

</div>







<div class="checkbox">

<input type="checkbox" required>

<span>
I agree to Terms & Conditions
</span>

</div>






<button type="submit">

Register Now

</button>



<p id="message"></p>


</form>



<div class="login">

Already have account?
<a href="#">Login</a>

</div>


</div>





<script>


function showPassword(){

let pass=document.getElementById("password");

if(pass.type==="password"){

pass.type="text";

}
else{

pass.type="password";

}

}




let password=document.getElementById("password");

let bar=document.getElementById("strengthBar");


password.addEventListener("input",()=>{


let value=password.value;

let strength=0;


if(value.length>=6)
strength+=25;

if(/[A-Z]/.test(value))
strength+=25;

if(/[0-9]/.test(value))
strength+=25;

if(/[!@#$%^&*]/.test(value))
strength+=25;



bar.style.width=strength+"%";


if(strength<=25)
bar.style.background="red";

else if(strength<=50)
bar.style.background="orange";

else if(strength<=75)
bar.style.background="yellow";

else
bar.style.background="green";


});





document.getElementById("registerForm").addEventListener("submit",
function(e){

e.preventDefault();


let pass=document.getElementById("password").value;

let confirm=document.getElementById("confirm").value;


let msg=document.getElementById("message");


if(pass!==confirm){

msg.style.color="red";
msg.innerHTML="❌ Passwords do not match";

return;

}


msg.style.color="green";
msg.innerHTML="✅ Registration Successful!";


this.reset();


});



</script>


</body>
</html>
